name = "kids-map"
main = "src/index.ts"
compatibility_date = "2026-03-02"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
[observability.logs]
head_sampling_rate = 1
[observability.traces]
enabled = true
head_sampling_rate = 0.01

# Static assets: serve Vite-built SPA from dist/
# run_worker_first = ["/api/*"] routes only API requests through the Worker.
# All other requests serve static assets directly; unmatched paths fall back
# to index.html (SPA mode) via not_found_handling.
[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# ── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "roadtrip-db"
database_id = "placeholder-replace-after-wrangler-d1-create"
migrations_dir = "src/db/migrations"

# ── KV Namespace (geocoding + routing cache) ─────────────────────────────────
[[kv_namespaces]]
binding = "API_CACHE"
id = "placeholder-replace-after-wrangler-kv-namespace-create"

# ── R2 Bucket (print images) ─────────────────────────────────────────────────
[[r2_buckets]]
binding = "ROADTRIP_PRINTS"
bucket_name = "roadtrip-prints"

# ── Rate Limiters ─────────────────────────────────────────────────────────────
[[ratelimits]]
name = "RATE_LIMITER_PUBLIC"
namespace_id = "1001"
[ratelimits.simple]
limit = 60
period = 60

[[ratelimits]]
name = "RATE_LIMITER_PROXY"
namespace_id = "1002"
[ratelimits.simple]
limit = 30
period = 60

[[ratelimits]]
name = "RATE_LIMITER_AUTH"
namespace_id = "1003"
[ratelimits.simple]
limit = 10
period = 60
